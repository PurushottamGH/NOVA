[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".git",
    "__pycache__",
    "weights/",
    "logs/",
    "personal_data/",
    "tokenizer_data/",
    "nova_memory/",
    "data/collector_cache/",
    "temp/",
    "tmp/",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort (import sorting)
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # Ruff-specific rules
]
ignore = [
    "E501",    # Line length handled by formatter
    "N806",    # Variable names in uppercase (allowed for constants)
    "N812",    # Lowercase imported as non-lowercase (e.g. `import functional as F`)
    "RUF002",  # Ambiguous unicode in docstrings (box-drawing chars are intentional)
    "RUF003",  # Ambiguous unicode in comments (box-drawing chars are intentional)
    "RUF012",  # Mutable class defaults (acceptable for config-style class attrs)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # Unused imports in __init__ are intentional
"test_all.py" = ["E402", "F401", "B025"]  # sys.path manipulation, pytest availability check
"scripts/quick_chat.py" = ["E402"]  # sys.path manipulation before imports
"scripts/nova_chat_ui.py" = ["E402"]  # sys.path manipulation before imports
"inference/chat.py" = ["E402"]  # torch config must run before project imports
"inference/generate.py" = ["SIM108"]  # if/else block is clearer than ternary for this logic
"data/collector.py" = ["F401"]  # try-import for availability check
"notebooks/*.ipynb" = ["E402"]  # Notebook cells have different import conventions

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
